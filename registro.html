<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Núcleo — Crear cuenta</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="app-shell">

    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">N</span>
        <span class="brand-text">Núcleo</span>
      </div>
      <div class="header-search">
        <input type="search" placeholder="Buscar proyecto o tarea..." />
      </div>
      <div class="header-user">
        <span>Invitado</span>
        <div class="avatar">?</div>
      </div>
    </header>

    <nav class="app-nav" aria-label="Navegación principal">
      <ul>
        <li><a href="index.html">📊 Dashboard</a></li>
        <li><a href="#">📁 Proyectos</a></li>
        <li><a href="#">👥 Equipo</a></li>
        <li><a href="registro.html" aria-current="page">🆕 Crear cuenta</a></li>
        <li><a href="#">⚙️ Configuración</a></li>
      </ul>
    </nav>

    <main class="app-main">
      <div>
        <h1 class="page-title">Crea tu cuenta</h1>
        <p class="page-subtitle">Regístrate para empezar a gestionar tus proyectos en Núcleo.</p>
      </div>

      <section class="register-wrapper panel" aria-label="Formulario de registro">
        <form class="form-grid" novalidate>

          <div class="field full">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej. Sofía Reyes" required />
          </div>

          <div class="field full">
            <label for="correo">Correo institucional</label>
            <input type="email" id="correo" name="correo" placeholder="nombre@isw306.edu.do" required />
            <small>Usa el correo asignado por la universidad.</small>
          </div>

          <div class="field">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" minlength="8" required />
          </div>

          <div class="field">
            <label for="password2">Confirmar contraseña</label>
            <input type="password" id="password2" name="password2" minlength="8" required />
          </div>

          <div class="field full">
            <label for="carrera">Programa académico</label>
            <select id="carrera" name="carrera" required>
              <option value="" disabled selected>Selecciona una opción</option>
              <option value="isw">Ingeniería de Software</option>
              <option value="sistemas">Ingeniería de Sistemas</option>
              <option value="redes">Redes y Telecomunicaciones</option>
              <option value="datos">Ciencia de Datos</option>
            </select>
          </div>

          <div class="field full checkbox-field">
            <input type="checkbox" id="terminos" name="terminos" required />
            <label for="terminos">Acepto los términos de uso y la política de privacidad de Núcleo.</label>
          </div>

          <div class="field full">
            <button type="submit" class="btn-primary">Crear cuenta</button>
          </div>

        </form>
      </section>
    </main>

    <footer class="app-footer">
      <p>&copy; 2026 Núcleo — Proyecto ISW-306. Hecho con HTML5 semántico y CSS.</p>
    </footer>

  </div>

</body>
</html>
